name: Architectural Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-arch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run architectural lint
        run: pnpm lint:arch

      - name: Verify enforcement fixtures
        run: pnpm lint:arch:test
